<mat-form-field appearance="outline" class="password-field">
  <mat-label>{{ label() }}</mat-label>

  <input
    matInput
    [type]="hidePassword ? 'password' : 'text'"
    [formControl]="control()" />

  <button
    mat-icon-button
    matSuffix
    type="button"
    (click)="togglePasswordVisibility()">

    <mat-icon>
      {{ hidePassword ? 'visibility' : 'visibility_off' }}
    </mat-icon>

  </button>
</mat-form-field>
