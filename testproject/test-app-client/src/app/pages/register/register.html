<mat-card class="register-card">
  <mat-card-title>Register Customer</mat-card-title>

  <mat-card-content>
    <app-customer-form [form]="form"></app-customer-form>

    <app-password-field label="Password" [control]="passwordControl">
    </app-password-field>

    <p class="message">{{ message }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" type="button" (click)="registerCustomer()">
      Register
    </button>
  </mat-card-actions>
</mat-card>
