<mat-card class="login-card">
  <mat-card-title>Login</mat-card-title>

  <mat-card-content>
    <form (ngSubmit)="loginCustomer()" class="login-form">

      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput name="username" [(ngModel)]="loginRequest.username" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="loginRequest.password" required />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit">
        Login
      </button>
    </form>

    <p class="message">{{ message }}</p>
  </mat-card-content>
</mat-card>
